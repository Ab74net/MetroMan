version: "3.9"
services:
  db:
    image: postgis/postgis:15-3.3
    container_name: metro-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: metro_db
      POSTGRES_USER: metro
      POSTGRES_PASSWORD: metro
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: metro-redis
    ports:
      - "6379:6379"
volumes:
  postgres_data:
